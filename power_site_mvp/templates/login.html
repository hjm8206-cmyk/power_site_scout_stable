<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PowerSite Scout OS Login</title>
    <link rel="stylesheet" href="/static/style.css?v={{ app_version }}" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card" aria-label="PowerSite Scout OS 로그인">
        <div class="login-brand">
          <span class="login-mark">PS</span>
          <div>
            <h1>PowerSite Scout OS</h1>
            <p>전력입지 선점 대시보드</p>
          </div>
        </div>

        <div class="login-copy">
          <h2>내부팀 전용 접속</h2>
          <p>로그인 후 주소검색, 필지분석, 점수표, 리포트를 사용할 수 있습니다.</p>
        </div>

        {% if error %}
        <div class="login-alert {% if setup_error %}setup{% endif %}" role="alert">{{ error }}</div>
        {% endif %}

        <form class="login-form" method="post" action="/login">
          <input type="hidden" name="next" value="{{ next_url }}" />
          <label>
            <span>아이디</span>
            <input name="username" type="text" autocomplete="username" required autofocus />
          </label>
          <label>
            <span>비밀번호</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="primary-button">접속하기</button>
        </form>

        <p class="login-footnote">
          Vercel 환경변수 APP_LOGIN_ID, APP_LOGIN_PASSWORD로 보호됩니다.
        </p>
      </section>
    </main>
  </body>
</html>
