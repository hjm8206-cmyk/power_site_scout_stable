name: Import Cloudflare stable package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-stable-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download and extract stable package
        env:
          POWERSITE_STABLE_ZIP_URL: https://dat-ringtones-heath-shipments.trycloudflare.com/static/power_site_scout_stable_vercel_ready.zip?v=202605060401
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import os
          import shutil
          import urllib.request
          import zipfile
          from pathlib import Path

          url = os.environ['POWERSITE_STABLE_ZIP_URL']
          repo = Path.cwd()
          temp = repo / '.tmp_import_stable'
          zip_path = temp / 'stable.zip'
          extract_dir = temp / 'extract'

          if temp.exists():
              shutil.rmtree(temp)
          extract_dir.mkdir(parents=True)

          req = urllib.request.Request(url, headers={'User-Agent': 'powersite-github-import'})
          with urllib.request.urlopen(req, timeout=60) as response:
              zip_path.write_bytes(response.read())
          if zip_path.stat().st_size == 0:
              raise RuntimeError('Downloaded stable package is empty')

          def safe_name(raw: str) -> Path | None:
              name = raw.replace('\\\\', '/').replace('\\', '/').lstrip('/')
              if not name or name.endswith('/'):
                  return None
              parts = [part for part in name.split('/') if part]
              if any(part in {'.', '..'} for part in parts):
                  return None
              return Path(*parts)

          with zipfile.ZipFile(zip_path) as archive:
              for member in archive.infolist():
                  rel = safe_name(member.filename)
                  if rel is None:
                      continue
                  target = extract_dir / rel
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(member) as source, target.open('wb') as output:
                      shutil.copyfileobj(source, output)

          source = extract_dir / 'power_site_mvp'
          if not source.exists():
              raise RuntimeError('ZIP does not contain power_site_mvp/')

          target = repo / 'power_site_mvp'
          if target.exists():
              shutil.rmtree(target)
          shutil.copytree(source, target)

          for path in list(repo.rglob('__pycache__')):
              if path.is_dir():
                  shutil.rmtree(path, ignore_errors=True)
          for pattern in ('*.pyc', '*.pyo', '*.log', '*.pid'):
              for path in repo.rglob(pattern):
                  if path.is_file():
                      path.unlink(missing_ok=True)
          for path in (
              repo / 'power_site_mvp' / 'static' / 'power_site_scout_stable_vercel_ready.zip',
              repo / '.tmp_import_stable',
          ):
              if path.is_dir():
                  shutil.rmtree(path, ignore_errors=True)
              elif path.exists():
                  path.unlink()
          PY

      - name: Restore Vercel deploy files
        run: |
          cat > vercel.json <<'EOF'
          {
            "version": 2,
            "buildCommand": "npm run build",
            "builds": [
              {
                "src": "api/index.py",
                "use": "@vercel/python"
              }
            ],
            "routes": [
              {
                "src": "/(.*)",
                "dest": "api/index.py"
              }
            ]
          }
          EOF
          cat > package.json <<'EOF'
          {
            "name": "power-site-scout-stable",
            "private": true,
            "version": "0.1.0",
            "scripts": {
              "build": "node scripts/build-check.mjs"
            },
            "dependencies": {}
          }
          EOF
          mkdir -p scripts
          cat > scripts/build-check.mjs <<'EOF'
          import { execFileSync } from 'node:child_process';
          import { existsSync, mkdirSync, writeFileSync } from 'node:fs';

          const requiredFiles = [
            'api/index.py',
            'power_site_mvp/__init__.py',
            'power_site_mvp/app/main.py',
            'power_site_mvp/templates/index.html',
            'power_site_mvp/templates/login.html',
            'power_site_mvp/static/app.js',
            'power_site_mvp/static/style.css',
            'requirements.txt',
            'vercel.json'
          ];

          for (const file of requiredFiles) {
            if (!existsSync(file)) {
              throw new Error(`Missing required deploy file: ${file}`);
            }
          }

          execFileSync(process.execPath, ['--check', 'power_site_mvp/static/app.js'], { stdio: 'inherit' });
          mkdirSync('public', { recursive: true });
          writeFileSync(
            'public/index.html',
            '<!doctype html><meta charset="utf-8"><title>PowerSite Scout OS</title><p>PowerSite Scout OS</p>\n'
          );
          console.log('PowerSite Scout OS root build check passed.');
          EOF

          cat > power_site_mvp/vercel.json <<'EOF'
          {
            "version": 2,
            "buildCommand": "npm run build",
            "builds": [
              {
                "src": "api/index.py",
                "use": "@vercel/python"
              }
            ],
            "routes": [
              {
                "src": "/(.*)",
                "dest": "api/index.py"
              }
            ]
          }
          EOF
          cat > power_site_mvp/package.json <<'EOF'
          {
            "name": "powersite-scout-os",
            "private": true,
            "version": "0.1.0",
            "scripts": {
              "build": "node scripts/build-check.mjs"
            }
          }
          EOF
          mkdir -p power_site_mvp/scripts
          cat > power_site_mvp/scripts/build-check.mjs <<'EOF'
          import { execFileSync } from "node:child_process";
          import { existsSync, mkdirSync, writeFileSync } from "node:fs";

          const requiredFiles = [
            "api/index.py",
            "app/main.py",
            "templates/index.html",
            "templates/login.html",
            "static/app.js",
            "static/style.css",
            "requirements.txt",
            "vercel.json"
          ];

          for (const file of requiredFiles) {
            if (!existsSync(file)) {
              throw new Error(`Missing required deploy file: ${file}`);
            }
          }

          execFileSync(process.execPath, ["--check", "static/app.js"], { stdio: "inherit" });
          mkdirSync("public", { recursive: true });
          writeFileSync(
            "public/index.html",
            '<!doctype html><meta charset="utf-8"><title>PowerSite Scout OS</title><p>PowerSite Scout OS</p>\n'
          );
          console.log("PowerSite Scout OS build check passed.");
          EOF

      - name: Commit imported stable package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No stable package changes to commit"
            exit 0
          fi
          git commit -m "chore: import stable app snapshot"
          git push
